name: validate

on:
  push:
  pull_request:

jobs:
  validate-example:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - run: python3 scripts/validate_skill.py
      - run: python3 scripts/validate_handoff.py examples/workspace-handoff.json
