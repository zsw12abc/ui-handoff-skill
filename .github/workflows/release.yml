name: release

on:
  push:
    tags:
      - "v*.*.*"
    branches:
      - main
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, e.g. v0.1.1"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    if: github.event_name != 'push' || startsWith(github.ref, 'refs/tags/') || contains(github.event.head_commit.message, '[release]')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Resolve release tag
        id: resolve
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            TAG="${{ github.event.inputs.tag }}"
            SOURCE="workflow_dispatch input"
          elif [[ "${{ github.ref }}" == refs/tags/* ]]; then
            TAG="${{ github.ref_name }}"
            SOURCE="pushed tag"
          else
            VERSION="$(python3 - <<'PY'
          from pathlib import Path
          text = Path("SKILL.md").read_text(encoding="utf-8")
          frontmatter = text.split("---", 2)[1]
          for line in frontmatter.splitlines():
              if line.startswith("version:"):
                  print(line.split(":", 1)[1].strip())
                  break
          PY
          )"
            TAG="v${VERSION}"
            SOURCE="SKILL.md frontmatter"
          fi
          echo "Resolved tag $TAG (source: $SOURCE)"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Validate skill metadata
        run: python3 scripts/validate_skill.py

      - name: Validate example handoff
        run: python3 scripts/validate_handoff.py examples/workspace-handoff.json

      - name: Check tag matches SKILL.md version
        env:
          RELEASE_TAG: ${{ steps.resolve.outputs.tag }}
        run: |
          VERSION="$(python3 - <<'PY'
          from pathlib import Path
          text = Path("SKILL.md").read_text(encoding="utf-8")
          frontmatter = text.split("---", 2)[1]
          for line in frontmatter.splitlines():
              if line.startswith("version:"):
                  print(line.split(":", 1)[1].strip())
                  break
          PY
          )"
          TAG="${RELEASE_TAG#v}"
          if [ "$VERSION" != "$TAG" ]; then
            echo "SKILL.md version $VERSION does not match tag $RELEASE_TAG"
            exit 1
          fi

      - name: Refuse to clobber existing tag
        env:
          RELEASE_TAG: ${{ steps.resolve.outputs.tag }}
        run: |
          if git rev-parse "refs/tags/$RELEASE_TAG" >/dev/null 2>&1; then
            echo "Tag $RELEASE_TAG already exists. Bump version: in SKILL.md before releasing again."
            exit 1
          fi

      - name: Build release archives
        env:
          RELEASE_TAG: ${{ steps.resolve.outputs.tag }}
        run: |
          mkdir -p dist
          git archive --format=zip --prefix=ui-handoff-skill/ -o "dist/ui-handoff-skill-$RELEASE_TAG.zip" HEAD
          git archive --format=tar.gz --prefix=ui-handoff-skill/ -o "dist/ui-handoff-skill-$RELEASE_TAG.tar.gz" HEAD

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: UI Handoff Skill ${{ steps.resolve.outputs.tag }}
          tag_name: ${{ steps.resolve.outputs.tag }}
          body: |
            ## Install

                npx skills add zsw12abc/ui-handoff-skill@${{ steps.resolve.outputs.tag }} -y

            ## Update

                npx skills update ui-handoff

            This release was validated with:
            - scripts/validate_skill.py
            - scripts/validate_handoff.py examples/workspace-handoff.json
          files: |
            dist/ui-handoff-skill-${{ steps.resolve.outputs.tag }}.zip
            dist/ui-handoff-skill-${{ steps.resolve.outputs.tag }}.tar.gz
